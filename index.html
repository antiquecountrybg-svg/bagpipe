<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🎵 СВИРИ!</title>
  <link href="https://fonts.googleapis.com/css2?family=Uncial+Antiqua&family=Nunito:wght@600;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --white:  #f5f5f0;
      --green:  #00966E;
      --red:    #D62612;
      --dark:   #1a1208;
      --gold:   #c8a84b;
      --cream:  #fdf6e3;
    }

    body {
      /* Bulgarian tricolour as background */
      background: linear-gradient(180deg,
        var(--white) 0%, var(--white) 33.33%,
        var(--green) 33.33%, var(--green) 66.66%,
        var(--red) 66.66%, var(--red) 100%
      );
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* ── Decorative folk-art border lines ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      border: 10px solid var(--gold);
      box-shadow: inset 0 0 0 4px var(--dark), inset 0 0 0 7px var(--gold);
      z-index: 100;
    }

    /* ── Floating folk motif dots ── */
    .motif {
      position: fixed;
      font-size: 1.6rem;
      pointer-events: none;
      z-index: 1;
      opacity: 0.18;
      animation: floatMotif linear infinite;
    }
    @keyframes floatMotif {
      from { transform: translateY(110vh) rotate(0deg); }
      to   { transform: translateY(-20vh) rotate(360deg); }
    }

    /* ── Card ── */
    .card {
      position: relative;
      z-index: 10;
      background: rgba(253, 246, 227, 0.93);
      border: 4px solid var(--dark);
      box-shadow: 8px 8px 0 var(--dark), 0 0 0 8px var(--gold), 16px 16px 0 var(--dark);
      border-radius: 4px;
      padding: 44px 52px 38px;
      text-align: center;
      max-width: 500px;
      width: 92vw;
      animation: cardBounce 0.7s cubic-bezier(.34,1.56,.64,1) both;
    }
    @keyframes cardBounce {
      from { opacity:0; transform: scale(0.7) translateY(40px); }
      to   { opacity:1; transform: scale(1)   translateY(0); }
    }

    /* ── Big bagpipe ── */
    .pipe-wrap {
      position: relative;
      display: inline-block;
      margin-bottom: 12px;
    }
    .big-pipe {
      font-size: 88px;
      display: block;
      animation: pipeBob 1.4s ease-in-out infinite alternate;
      filter: drop-shadow(0 4px 12px rgba(26,18,8,0.25));
      cursor: pointer;
      user-select: none;
    }
    @keyframes pipeBob {
      from { transform: translateY(0px) rotate(-4deg); }
      to   { transform: translateY(-10px) rotate(4deg); }
    }
    .big-pipe:active { transform: scale(0.88) !important; }

    /* Bulgarian flag badge */
    .flag-badge {
      position: absolute;
      top: -12px; left: -18px;
      width: 42px; height: 28px;
      border: 2.5px solid var(--dark);
      border-radius: 3px;
      overflow: hidden;
      box-shadow: 2px 2px 0 var(--dark);
      display: flex; flex-direction: column;
    }
    .flag-badge .s1 { flex: 1; background: var(--white); border-bottom: 1px solid #ccc; }
    .flag-badge .s2 { flex: 1; background: var(--green); }
    .flag-badge .s3 { flex: 1; background: var(--red); }

    /* speech bubble */
    .bubble-speech {
      position: absolute;
      top: -18px; right: -90px;
      background: var(--cream);
      border: 2.5px solid var(--dark);
      border-radius: 4px;
      padding: 5px 12px;
      font-family: 'Uncial Antiqua', cursive;
      font-size: 0.9rem;
      color: var(--dark);
      white-space: nowrap;
      opacity: 0;
      transform: scale(0.6) translateY(10px);
      transition: all 0.25s cubic-bezier(.34,1.56,.64,1);
      pointer-events: none;
      box-shadow: 3px 3px 0 var(--dark);
    }
    .bubble-speech::before {
      content: '';
      position: absolute;
      left: -10px; top: 50%;
      transform: translateY(-50%);
      border: 6px solid transparent;
      border-right-color: var(--dark);
    }
    .bubble-speech.show { opacity: 1; transform: scale(1) translateY(0); }

    /* ── Folk divider ── */
    .divider {
      width: 100%;
      height: 6px;
      background: repeating-linear-gradient(
        90deg,
        var(--red) 0px, var(--red) 10px,
        var(--gold) 10px, var(--gold) 20px,
        var(--green) 20px, var(--green) 30px,
        var(--gold) 30px, var(--gold) 40px
      );
      border-radius: 3px;
      margin: 14px 0 18px;
    }

    h1 {
      font-family: 'Uncial Antiqua', cursive;
      font-size: clamp(1.9rem, 7vw, 2.8rem);
      color: var(--dark);
      letter-spacing: 0.04em;
      margin-bottom: 4px;
    }
    h1 span { color: var(--green); }

    .subtitle {
      color: #8a7a5a;
      font-size: 0.88rem;
      margin-bottom: 4px;
    }

    /* ── Progress bar ── */
    .progress-section { margin-bottom: 18px; }
    .progress-bg {
      width: 100%;
      height: 14px;
      background: #ddd;
      border-radius: 2px;
      cursor: pointer;
      overflow: hidden;
      border: 2px solid var(--dark);
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: repeating-linear-gradient(
        90deg,
        var(--red) 0px, var(--red) 10px,
        var(--gold) 10px, var(--gold) 20px,
        var(--green) 20px, var(--green) 30px
      );
      transition: width 0.3s linear;
    }
    .time-row {
      display: flex; justify-content: space-between;
      font-size: 0.75rem; color: #aaa; margin-top: 5px;
      font-variant-numeric: tabular-nums;
    }

    /* ── Controls ── */
    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin-bottom: 18px;
    }
    .btn-play {
      width: 66px; height: 66px;
      border: 3px solid var(--dark);
      border-radius: 50%;
      background: var(--green);
      color: #fff;
      font-size: 1.7rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 4px 4px 0 var(--dark);
      transition: transform 0.12s, box-shadow 0.12s;
    }
    .btn-play:hover { transform: translateY(-2px); box-shadow: 6px 6px 0 var(--dark); }
    .btn-play:active { transform: translate(3px,3px); box-shadow: 1px 1px 0 var(--dark); }

    /* ── Volume ── */
    .volume-row {
      display: flex; align-items: center; justify-content: center;
      gap: 10px; margin-bottom: 22px;
    }
    .vol-icon { font-size: 1.1rem; cursor: pointer; }
    input[type="range"] {
      -webkit-appearance: none;
      width: 120px; height: 6px;
      background: #ddd;
      border-radius: 2px;
      outline: none; cursor: pointer;
      border: 1.5px solid var(--dark);
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px; height: 18px;
      background: var(--red);
      border-radius: 2px;
      border: 2px solid var(--dark);
      box-shadow: 2px 2px 0 var(--dark);
    }

    /* ── Play counter ── */
    .play-counter {
      background: linear-gradient(135deg, #fff8e6, #ffecc8);
      border: 2px solid var(--gold);
      border-radius: 4px;
      padding: 10px 18px;
      margin-bottom: 22px;
      font-size: 0.9rem;
      color: var(--dark);
      box-shadow: 3px 3px 0 var(--dark);
    }
    .play-counter strong {
      color: var(--red);
      font-family: 'Uncial Antiqua', cursive;
      font-size: 1.4rem;
    }

    /* ── GitHub link ── */
    .gh-link {
      display: inline-flex; align-items: center; gap: 8px;
      color: var(--dark);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 700;
      padding: 9px 20px;
      border: 2px solid var(--dark);
      border-radius: 2px;
      background: var(--white);
      transition: background 0.2s, transform 0.15s;
      box-shadow: 3px 3px 0 var(--dark);
    }
    .gh-link:hover { background: #ffd6a0; transform: translate(-1px,-1px); box-shadow: 4px 4px 0 var(--dark); }
    .gh-link:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 var(--dark); }
    .gh-link svg { width: 16px; height: 16px; fill: currentColor; }

    /* ── Flying pipes ── */
    .fly-pipe {
      position: fixed;
      font-size: 2.2rem;
      pointer-events: none;
      z-index: 9999;
      animation: flyPipe 1.5s ease-out forwards;
    }
    @keyframes flyPipe {
      0%   { opacity:1; transform: translate(0,0) rotate(0deg) scale(1); }
      100% { opacity:0; transform: translate(var(--dx), var(--dy)) rotate(var(--dr)) scale(0.3); }
    }

    /* ── Autoplay nudge ── */
    .autoplay-nudge {
      position: fixed; inset: 0;
      background: rgba(0, 150, 110, 0.55);
      backdrop-filter: blur(4px);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 200;
    }
    .nudge-box {
      background: var(--cream);
      border: 4px solid var(--dark);
      border-radius: 4px;
      padding: 40px 52px;
      text-align: center;
      box-shadow: 8px 8px 0 var(--dark), 0 0 0 8px var(--gold), 16px 16px 0 var(--dark);
      animation: nudgeBounce 0.6s cubic-bezier(.34,1.56,.64,1) both;
    }
    @keyframes nudgeBounce {
      from { transform: scale(0.6); opacity:0; }
      to   { transform: scale(1);   opacity:1; }
    }
    .nudge-pipe { font-size: 80px; display: block; animation: pipeBob 1s ease-in-out infinite alternate; }
    .nudge-flag {
      display: flex; flex-direction: column;
      width: 60px; height: 38px;
      border: 2.5px solid var(--dark);
      border-radius: 2px;
      overflow: hidden;
      margin: 10px auto 8px;
      box-shadow: 3px 3px 0 var(--dark);
    }
    .nudge-flag div { flex: 1; }
    .nudge-title { font-family: 'Uncial Antiqua', cursive; font-size: 2rem; color: var(--dark); margin: 6px 0; }
    .nudge-sub { color: #8a7a5a; font-size: 0.9rem; margin-bottom: 24px; }
    .nudge-btn {
      background: var(--red);
      color: #fff;
      border: 3px solid var(--dark);
      border-radius: 2px;
      padding: 14px 36px;
      font-family: 'Uncial Antiqua', cursive;
      font-size: 1.3rem;
      cursor: pointer;
      box-shadow: 4px 4px 0 var(--dark);
      transition: transform 0.12s, box-shadow 0.12s;
    }
    .nudge-btn:hover { transform: translate(-1px,-1px); box-shadow: 5px 5px 0 var(--dark); }
    .nudge-btn:active { transform: translate(3px,3px); box-shadow: 1px 1px 0 var(--dark); }
  </style>
</head>
<body>

  <!-- Floating folk motifs -->
  <script>
    ['✦','❋','✿','❀','✾','◈'].forEach((m, i) => {
      const el = document.createElement('div');
      el.className = 'motif';
      el.textContent = m;
      el.style.left = (Math.random()*95) + '%';
      el.style.animationDuration = (Math.random()*18+12) + 's';
      el.style.animationDelay = (Math.random()*10) + 's';
      document.body.appendChild(el);
    });
  </script>

  <!-- Autoplay nudge -->
  <div class="autoplay-nudge" id="nudge">
    <div class="nudge-box">
      <span class="nudge-pipe">🎵</span>
      <div class="nudge-flag"><div style="background:var(--white)"></div><div style="background:var(--green)"></div><div style="background:var(--red)"></div></div>
      <p class="nudge-title">Готов ли си?</p>
      <p class="nudge-sub">Click to unleash the gaida! 🎶</p>
      <button class="nudge-btn" id="nudgeBtn">🎵 СВИРИ!</button>
    </div>
  </div>

  <div class="card">
    <div class="pipe-wrap">
      <div class="flag-badge"><div class="s1"></div><div class="s2"></div><div class="s3"></div></div>
      <span class="big-pipe" id="mainPipe">🎵</span>
      <div class="bubble-speech" id="speech">СВИРИ!</div>
    </div>

    <h1>The <span>Gaida</span> Site</h1>
    <p class="subtitle">Bulgarian bagpipe music 🇧🇬 · Гайда</p>

    <div class="divider"></div>

    <div class="progress-section">
      <div class="progress-bg" id="progressBg">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="time-row">
        <span id="timeNow">0:00</span>
        <span id="timeTotal">0:00</span>
      </div>
    </div>

    <div class="controls">
      <button class="btn-play" id="playBtn">▶</button>
    </div>

    <div class="volume-row">
      <span class="vol-icon" id="muteBtn">🔊</span>
      <input type="range" id="volSlider" min="0" max="1" step="0.01" value="0.85"/>
    </div>

    <div class="play-counter">
      🎵 Times the gaida has played: <strong id="playCount">0</strong>
    </div>

    <a class="gh-link" href="https://github.com/YOUR-USERNAME/YOUR-REPO" target="_blank" id="ghLink">
      <svg viewBox="0 0 24 24"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg>
      View on GitHub
    </a>
  </div>

  <!-- Put your audio file named bagpipe.mp3 in the same folder -->
  <audio id="player" loop src="bagpipe.mp3"></audio>

  <script>
    const player    = document.getElementById('player');
    const playBtn   = document.getElementById('playBtn');
    const fill      = document.getElementById('progressFill');
    const progressBg= document.getElementById('progressBg');
    const timeNow   = document.getElementById('timeNow');
    const timeTotal = document.getElementById('timeTotal');
    const volSlider = document.getElementById('volSlider');
    const muteBtn   = document.getElementById('muteBtn');
    const playCount = document.getElementById('playCount');
    const mainPipe  = document.getElementById('mainPipe');
    const speech    = document.getElementById('speech');
    const nudge     = document.getElementById('nudge');
    const nudgeBtn  = document.getElementById('nudgeBtn');

    let playing = false;
    let total = 0;
    player.volume = 0.85;

    function fmt(s) {
      if (isNaN(s)) return '0:00';
      return Math.floor(s/60) + ':' + String(Math.floor(s%60)).padStart(2,'0');
    }

    function dismissNudge() {
      nudge.style.transition = 'opacity 0.35s';
      nudge.style.opacity = '0';
      setTimeout(() => nudge.remove(), 380);
    }

    function setPlaying(state) {
      playing = state;
      playBtn.textContent = state ? '⏸' : '▶';
      if (state) player.play().catch(()=>{});
      else player.pause();
    }

    player.play().then(() => {
      playing = true;
      playBtn.textContent = '⏸';
      dismissNudge();
    }).catch(() => {});

    nudgeBtn.addEventListener('click', () => {
      dismissNudge();
      setPlaying(true);
    });

    playBtn.addEventListener('click', () => setPlaying(!playing));

    player.addEventListener('play', () => { total++; playCount.textContent = total; });

    player.addEventListener('timeupdate', () => {
      if (!player.duration) return;
      fill.style.width = (player.currentTime / player.duration * 100) + '%';
      timeNow.textContent   = fmt(player.currentTime);
      timeTotal.textContent = fmt(player.duration);
    });

    progressBg.addEventListener('click', e => {
      if (!player.duration) return;
      const r = progressBg.getBoundingClientRect();
      player.currentTime = ((e.clientX - r.left) / r.width) * player.duration;
    });

    volSlider.addEventListener('input', () => {
      player.volume = volSlider.value;
      muteBtn.textContent = volSlider.value == 0 ? '🔇' : volSlider.value < 0.5 ? '🔉' : '🔊';
    });
    muteBtn.addEventListener('click', () => {
      player.muted = !player.muted;
      muteBtn.textContent = player.muted ? '🔇' : '🔊';
    });

    /* Clickable bagpipe */
    const phrases = ['СВИРИ! 🎵','ОПА!','Хoro!','*drone note*','ГАЙДА!','Свирѝ~','...пиуу?'];
    mainPipe.addEventListener('click', e => {
      speech.textContent = phrases[Math.floor(Math.random()*phrases.length)];
      speech.classList.remove('show');
      void speech.offsetWidth;
      speech.classList.add('show');
      setTimeout(() => speech.classList.remove('show'), 1400);

      for (let i = 0; i < 6; i++) {
        const s = document.createElement('div');
        s.className = 'fly-pipe';
        s.textContent = '🎵';
        s.style.left = e.clientX + 'px';
        s.style.top  = e.clientY + 'px';
        const angle = Math.random() * Math.PI * 2;
        const dist  = Math.random() * 160 + 80;
        s.style.setProperty('--dx', Math.cos(angle)*dist + 'px');
        s.style.setProperty('--dy', Math.sin(angle)*dist + 'px');
        s.style.setProperty('--dr', (Math.random()*360-180) + 'deg');
        s.style.animationDelay = (Math.random()*0.2) + 's';
        document.body.appendChild(s);
        setTimeout(() => s.remove(), 1700);
      }
    });

    document.getElementById('ghLink').addEventListener('click', e => {
      if (e.currentTarget.href.includes('antiquecountrybg-svg')) {
        e.preventDefault();
        alert('✏️ Replace YOUR-USERNAME/YOUR-REPO in the GitHub link!');
      }
    });
  </script>
</body>
</html>
